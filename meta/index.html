<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code Meta Analysis</title>
  <link rel="stylesheet" href="../style.css">
  <script type="module" src="../global.js"></script>
  <script type="module" src="main.js"></script>
</head>
<body class="meta-page">
  <main>
    <h1>Code Meta Analysis</h1>
    <p class="meta-note">
      This page summarizes the code in this portfolio and visualizes when commits were made.
    </p>

    <section aria-labelledby="summary-title">
      <h2 id="summary-title">Summary statistics</h2>
      <div id="stats"></div>
    </section>

    <section aria-labelledby="commits-title">
      <h2 id="commits-title">Commits by time of day</h2>
      <p id="selection-count" aria-live="polite">No commits selected</p>
      <div id="chart"></div>
      <dl id="language-breakdown" class="stats" aria-live="polite"></dl>
    </section>
  </main>

  <dl id="commit-tooltip" class="info tooltip" hidden>
    <dt>Commit</dt>
    <dd>
      <a href="" id="commit-link" target="_blank" rel="noreferrer noopener"></a>
    </dd>

    <dt>Date</dt>
    <dd id="commit-date"></dd>

    <dt>Time</dt>
    <dd id="commit-time"></dd>

    <dt>Author</dt>
    <dd id="commit-author"></dd>

    <dt>Lines edited</dt>
    <dd id="commit-lines"></dd>
  </dl>
</body>
</html>
