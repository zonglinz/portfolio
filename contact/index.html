  <h1>Contact</h1>

  <form action="mailto:YOUR_EMAIL@example.com" method="POST" enctype="text/plain">
    <label>
      Email:
      <input type="email" name="email" value="example@email.com">
    </label>

    <br><br>

    <label>
      Subject:
      <input name="subject" value="Hello from your website">
    </label>

    <br><br>

    <label>
      Message:
      <textarea name="body" rows="6" cols="40">Hi Zonglin, I found your website and wanted to reach out.</textarea>
    </label>

    <br><br>

    <button>Send</button>
  </form>
</body>
