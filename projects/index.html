<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects</title>
  <link rel="stylesheet" href="../style.css">
  <script type="module" src="../global.js"></script>
  <script type="module" src="projects.js"></script>
</head>
<body>
  <main>
    <h1 class="projects-title">Projects</h1>

    <div class="chart-container" aria-label="Projects by year visualization">
      <svg
        id="projects-pie-plot"
        viewBox="-50 -50 100 100"
        role="group"
        aria-label="Pie chart controls for filtering projects by year"
      ></svg>
      <ul class="legend" aria-label="Project years legend"></ul>
    </div>

    <input
      class="searchBar"
      type="search"
      aria-label="Search projects"
      placeholder="🔍 Search projects…"
    >

    <p class="filter-summary" aria-live="polite"></p>

    <div class="projects" aria-live="polite">
      <!-- Projects are added from ../lib/projects.json by projects.js -->
    </div>
  </main>
</body>
</html>
